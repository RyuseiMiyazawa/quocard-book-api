services:
  postgres:
    image: postgres:16-alpine
    container_name: quocard-book-api-postgres
    environment:
      POSTGRES_DB: quocard_book_api
      POSTGRES_USER: quocard
      POSTGRES_PASSWORD: quocard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quocard -d quocard_book_api"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
