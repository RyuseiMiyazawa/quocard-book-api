openapi: 3.0.3
info:
  title: quocard-book-api
  version: 1.0.0
  description: |
    書籍管理システムのバックエンド API。
    著者と書籍の登録・更新、および著者に紐づく書籍一覧の取得を提供する。
servers:
  - url: http://localhost:8080
tags:
  - name: Authors
  - name: Books
paths:
  /authors:
    post:
      tags: [Authors]
      summary: 著者を登録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuthorRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
  /authors/{authorId}:
    put:
      tags: [Authors]
      summary: 著者を更新する
      parameters:
        - $ref: '#/components/parameters/AuthorId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAuthorRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Author'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /authors/{authorId}/books:
    get:
      tags: [Authors]
      summary: 著者に紐づく書籍一覧を取得する
      parameters:
        - $ref: '#/components/parameters/AuthorId'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
        '404':
          $ref: '#/components/responses/NotFound'
  /books:
    post:
      tags: [Books]
      summary: 書籍を登録する
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          $ref: '#/components/responses/BadRequest'
  /books/{bookId}:
    put:
      tags: [Books]
      summary: 書籍を更新する
      parameters:
        - $ref: '#/components/parameters/BookId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBookRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    AuthorId:
      name: authorId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    BookId:
      name: bookId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    BadRequest:
      description: 不正なリクエスト
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
    NotFound:
      description: 対象が存在しない
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
  schemas:
    PublicationStatus:
      type: string
      enum:
        - UNPUBLISHED
        - PUBLISHED
    Author:
      type: object
      required: [id, name, birthDate]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        birthDate:
          type: string
          format: date
    Book:
      type: object
      required: [id, title, price, publicationStatus, authors]
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        price:
          type: integer
          minimum: 0
        publicationStatus:
          $ref: '#/components/schemas/PublicationStatus'
        authors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Author'
    CreateAuthorRequest:
      type: object
      required: [name, birthDate]
      properties:
        name:
          type: string
          minLength: 1
        birthDate:
          type: string
          format: date
    UpdateAuthorRequest:
      allOf:
        - $ref: '#/components/schemas/CreateAuthorRequest'
    CreateBookRequest:
      type: object
      required: [title, price, publicationStatus, authorIds]
      properties:
        title:
          type: string
          minLength: 1
        price:
          type: integer
          minimum: 0
        publicationStatus:
          $ref: '#/components/schemas/PublicationStatus'
        authorIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
    UpdateBookRequest:
      allOf:
        - $ref: '#/components/schemas/CreateBookRequest'
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
          format: uri
